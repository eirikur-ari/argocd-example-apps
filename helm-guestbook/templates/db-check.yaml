apiVersion: batch/v1
kind: Job
metadata:
  name: db-check-job
  annotations:
    argocd-argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 2
  template:
    spec:
      containers:
        - name: check
          image: busybox
          command: ["sh", "-c", "echo 'Running db check to $DB_HOST...'; sleep 10; echo 'Connected!'"]
      restartPolicy: Never
      env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: db_host
